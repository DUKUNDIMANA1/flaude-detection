name: fraud_detection_app
description: Real-time fraud detection mobile application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & networking
  http: ^1.1.0
  web_socket_channel: ^2.4.0

  # Local storage
  sqflite: ^2.3.0
  path: ^1.8.3
  shared_preferences: ^2.2.2

  # State management
  provider: ^6.1.1

  # UI components
  cupertino_icons: ^1.0.6
  fl_chart: ^0.66.2
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0

  # Notifications
  flutter_local_notifications: ^16.3.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  crypto: ^3.0.3
  flutter_secure_storage: ^9.0.0
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
